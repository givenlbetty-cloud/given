{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-primary text-white py-3">
                    <h3 class="mb-0">
                        {% if '/modifier/' in request.path %}
                           <i class="bi bi-pencil-square me-2"></i>Modifier l'article
                        {% else %}
                           <i class="bi bi-plus-circle me-2"></i>Nouvel Article
                        {% endif %}
                    </h3>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'mentoring:dashboard' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary fw-bold px-4">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
