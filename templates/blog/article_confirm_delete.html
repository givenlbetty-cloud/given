{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4 text-center p-4">
                <div class="text-danger mb-3">
                    <i class="bi bi-exclamation-triangle-fill" style="font-size: 3rem;"></i>
                </div>
                <h3 class="fw-bold mb-3">Confirmer la suppression</h3>
                <p class="text-muted mb-4">Êtes-vous sûr de vouloir supprimer l'article <strong>"{{ object.titre }}"</strong> ? Cette action est irréversible.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'mentoring:dashboard' %}" class="btn btn-secondary rounded-pill px-4">Annuler</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4 fw-bold">Supprimer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
