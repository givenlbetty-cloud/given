{% extends 'base.html' %}

{% block content %}
<h1>Nos Mentors</h1>
<div class="list-group">
    {% for mentor in mentors %}
    <a href="{% url 'mentorship:mentor_detail' mentor.pk %}" class="list-group-item list-group-item-action">
        <div class="d-flex w-100 justify-content-between">
            <h5 class="mb-1">{{ mentor.user.get_full_name|default:mentor.user.username }}</h5>
        </div>
        <p class="mb-1">{{ mentor.expertise }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
