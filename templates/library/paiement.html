{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">Confirmer l'achat</h3>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-cart-check fs-1 text-primary"></i>
                    </div>
                    <h4 class="text-center mb-3">Vous êtes sur le point d'acheter :</h4>
                    <h3 class="text-center fw-bold mb-4">{{ livre.titre }}</h3>
                    
                    <div class="d-flex justify-content-between align-items-center border-top border-bottom py-3 mb-4">
                        <span class="fs-5">Prix à payer :</span>
                        <span class="fs-4 fw-bold text-primary">{{ livre.prix }} €</span>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Confirmer le paiement</button>
                            <a href="{% url 'library:detail' livre.id %}" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                    
                    <p class="text-muted text-center small mt-3">
                        <i class="bi bi-lock-fill"></i> Paiement sécurisé (Simulation)
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
